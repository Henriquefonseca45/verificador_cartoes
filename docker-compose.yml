services:
  verificador-cartoes:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: verificador-cartoes
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DATA_DIR: /data
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-200}
    volumes:
      - verificador_data:/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  verificador_data:
